name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
 runs-on: ubuntu-latest
 steps:
  - uses: qwibitai/nanoclaw/repo-tokens@v1
    with:
      include: 'apps/**/*.{ts,tsx}'